<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#2563eb" />

    <meta property="og:title" content="Nexcoin - Game Top-up Marketplace" />
    <meta property="og:description" content="Instant game top-ups and gift cards for your favorite games." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://replit.com/public/images/opengraph.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@replit" />
    <meta name="twitter:title" content="Nexcoin" />
    <meta name="twitter:description" content="Instant game top-ups and gift cards for your favorite games." />
    <meta name="twitter:image" content="https://replit.com/public/images/opengraph.png" />

    <!-- Inline theme restore: runs synchronously before first paint to prevent flash -->
    <script>
      (function () {
        try {
          var cached = localStorage.getItem("nexcoin_theme_vars");
          if (cached) {
            var vars = JSON.parse(cached);
            var root = document.documentElement;
            Object.keys(vars).forEach(function (k) {
              root.style.setProperty(k, vars[k]);
            });
            if (vars["--background"] && vars["--background"].startsWith("220 20%")) {
              root.setAttribute("data-theme", "dark");
            } else {
              root.setAttribute("data-theme", "light");
            }
          }
        } catch (e) {}
      })();
    </script>

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
